name: Manual Binary Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
        default: "main"

      build_linux:
        description: "Build Linux binary"
        type: boolean
        default: true

      build_macos:
        description: "Build macOS universal binary (Intel + Apple Silicon)"
        type: boolean
        default: true

      build_windows:
        description: "Build Windows binary"
        type: boolean
        default: true

      publish_release:
        description: "Publish binaries to GitHub Release"
        type: boolean
        default: false

concurrency:
  group: manual-build
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"

jobs:
  build-linux:
    if: inputs.build_linux
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qtbase5-dev qt5-qmake

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install .

    - name: Build Linux binary
      run: |
        pyinstaller pyrpl.spec
        mv dist/pyrpl pyrpl-linux-${{ inputs.ref }}
        chmod +x pyrpl-linux-${{ inputs.ref }}
      env:
        QT_QPA_PLATFORM: offscreen

    - uses: actions/upload-artifact@v4
      with:
        name: pyrpl-linux
        path: pyrpl-linux-${{ inputs.ref }}

  build-macos:
    if: inputs.build_macos
    strategy:
      matrix:
        arch:
          - name: arm64
            runner: macos-14
          - name: x86_64
            runner: macos-14

    runs-on: ${{ matrix.arch.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build pyrpl (macOS ${{ matrix.arch.name }})
        run: |
          pyinstaller pyrpl.spec
          mv dist/pyrpl pyrpl-macos-${{ matrix.arch.name }}-${{ inputs.ref }}
          chmod +x pyrpl-macos-${{ matrix.arch.name }}-${{ inputs.ref }}

      - name: Verify architecture
        run: |
          file pyrpl-macos-${{ matrix.arch.name }}-${{ inputs.ref }}
      - uses: actions/upload-artifact@v4
        with:
            name: pyrpl-macos-${{ matrix.arch.name }}-${{ inputs.ref }}
            path: pyrpl-macos-${{ matrix.arch.name }}-${{ inputs.ref }}

  build-windows:
    if: inputs.build_windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install .

    - name: Build Windows binary
      run: |
        pyinstaller pyrpl.spec
        move dist\pyrpl.exe pyrpl-windows-${{ inputs.ref }}.exe
      env:
        QT_QPA_PLATFORM_PLUGIN_PATH: ${{ env.Python_ROOT_DIR }}\Lib\site-packages\PyQt5\Qt5\plugins\platforms

    - uses: actions/upload-artifact@v4
      with:
        name: pyrpl-windows
        path: pyrpl-windows-${{ inputs.ref }}.exe

  publish-release:
    if: inputs.publish_release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: Create GitHub Release (if needed)
      id: release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ inputs.ref }}
        release_name: Release ${{ inputs.ref }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Linux binary
      if: inputs.build_linux
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: release-assets/pyrpl-linux/pyrpl-linux-${{ inputs.ref }}
        asset_name: pyrpl-linux-${{ inputs.ref }}
        asset_content_type: application/octet-stream
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload macOS binary
      if: inputs.build_macos
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: release-assets/pyrpl-macos/pyrpl-macos-${{ matrix.arch.name }}-${{ inputs.ref }}
        asset_name: pyrpl-macos-${{ matrix.arch.name }}-${{ inputs.ref }}
        asset_content_type: application/octet-stream
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows binary
      if: inputs.build_windows
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: release-assets/pyrpl-windows/pyrpl-windows-${{ inputs.ref }}.exe
        asset_name: pyrpl-windows-${{ inputs.ref }}.exe
        asset_content_type: application/octet-stream
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
